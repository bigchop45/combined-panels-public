name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r combined_panels/requirements.txt
          pip install -r tape_standalone/requirements.txt
          pip install -r whale_absorption_standalone/requirements.txt

      - name: Compile check
        run: |
          python -m compileall combined_panels tape_standalone whale_absorption_standalone

      - name: Combined server smoke check
        run: |
          python combined_panels/run.py > /tmp/combined.log 2>&1 &
          PID=$!
          sleep 3
          curl --fail --silent http://127.0.0.1:8090/health > /tmp/health.json
          cat /tmp/health.json
          kill $PID
